<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none">
  <defs>
    <linearGradient id="distG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A5CFF" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#0A5CFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00C2FF" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <g opacity="0.06">
    <rect x="50" y="50" width="400" height="400" rx="20" stroke="#0A5CFF" stroke-width="1"/>
  </g>

  <!-- Central orchestrator -->
  <circle cx="250" cy="250" r="35" fill="#0A5CFF" fill-opacity="0.08" stroke="#0A5CFF" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="250" y="254" text-anchor="middle" fill="#0A5CFF" font-size="7" font-family="Geist, sans-serif" font-weight="600">ORQUESTRA</text>

  <!-- Connected nodes -->
  <g fill="#1A1F2B" stroke="#2A2F3B" stroke-width="1">
    <rect x="60" y="100" width="80" height="35" rx="6"/>
    <text x="100" y="121" text-anchor="middle" fill="#8B92A5" font-size="7" font-family="Geist, sans-serif">CRM</text>

    <rect x="360" y="100" width="80" height="35" rx="6"/>
    <text x="400" y="121" text-anchor="middle" fill="#8B92A5" font-size="7" font-family="Geist, sans-serif">IA</text>

    <rect x="60" y="360" width="80" height="35" rx="6"/>
    <text x="100" y="381" text-anchor="middle" fill="#8B92A5" font-size="7" font-family="Geist, sans-serif">DADOS</text>

    <rect x="360" y="360" width="80" height="35" rx="6"/>
    <text x="400" y="381" text-anchor="middle" fill="#8B92A5" font-size="7" font-family="Geist, sans-serif">AUTOMAÇÃO</text>
  </g>

  <!-- Connection lines -->
  <g stroke="#0A5CFF" stroke-width="0.8" opacity="0.3">
    <path d="M140 118 Q 195 118 215 230" />
    <path d="M360 118 Q 305 118 285 230" />
    <path d="M140 378 Q 195 378 215 270" />
    <path d="M360 378 Q 305 378 285 270" />
  </g>

  <!-- Traffic dots on lines -->
  <g fill="#0A5CFF" opacity="0.6">
    <circle cx="170" cy="118" r="2"/>
    <circle cx="330" cy="118" r="2"/>
    <circle cx="170" cy="378" r="2"/>
    <circle cx="330" cy="378" r="2"/>
  </g>

  <text x="250" y="450" text-anchor="middle" fill="#5A6275" font-size="9" font-family="Geist, sans-serif" font-weight="600" letter-spacing="3">ORQUESTRAÇÃO</text>
</svg>
