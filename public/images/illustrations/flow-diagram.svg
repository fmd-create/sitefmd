<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 120" fill="none">
  <defs>
    <linearGradient id="flowG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A5CFF" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#0A5CFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00C2FF" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Stage 1: Dados -->
  <rect x="0" y="35" width="140" height="50" rx="8" fill="#1A1F2B" stroke="#2A2F3B" stroke-width="1"/>
  <text x="70" y="55" text-anchor="middle" fill="#8B92A5" font-size="10" font-weight="600" font-family="Geist, sans-serif">DADOS BRUTOS</text>
  <text x="70" y="70" text-anchor="middle" fill="#5A6275" font-size="8" font-family="Inter, sans-serif">Fontes heterogêneas</text>

  <!-- Arrow 1 -->
  <line x1="140" y1="60" x2="190" y2="60" stroke="url(#flowG)" stroke-width="1.5"/>
  <polygon points="188,55 196,60 188,65" fill="#0A5CFF"/>

  <!-- Stage 2: Processamento -->
  <rect x="200" y="35" width="140" height="50" rx="8" fill="#1A1F2B" stroke="#2A2F3B" stroke-width="1"/>
  <text x="270" y="55" text-anchor="middle" fill="#8B92A5" font-size="10" font-weight="600" font-family="Geist, sans-serif">ENGENHARIA</text>
  <text x="270" y="70" text-anchor="middle" fill="#5A6275" font-size="8" font-family="Inter, sans-serif">ETL / Pipelines / Lake</text>

  <!-- Arrow 2 -->
  <line x1="340" y1="60" x2="390" y2="60" stroke="url(#flowG)" stroke-width="1.5"/>
  <polygon points="388,55 396,60 388,65" fill="#0A5CFF"/>

  <!-- Stage 3: IA -->
  <rect x="400" y="35" width="140" height="50" rx="8" fill="#0A5CFF10" stroke="#0A5CFF30" stroke-width="1"/>
  <text x="470" y="55" text-anchor="middle" fill="#0A5CFF" font-size="10" font-weight="600" font-family="Geist, sans-serif">INTELIGÊNCIA</text>
  <text x="470" y="70" text-anchor="middle" fill="#5A6275" font-size="8" font-family="Inter, sans-serif">ML / AI Agents / NLP</text>

  <!-- Arrow 3 -->
  <line x1="540" y1="60" x2="590" y2="60" stroke="url(#flowG)" stroke-width="1.5"/>
  <polygon points="588,55 596,60 588,65" fill="#00C2FF"/>

  <!-- Stage 4: Decisão -->
  <rect x="600" y="35" width="140" height="50" rx="8" fill="#1A1F2B" stroke="#2A2F3B" stroke-width="1"/>
  <text x="670" y="55" text-anchor="middle" fill="#8B92A5" font-size="10" font-weight="600" font-family="Geist, sans-serif">DECISÃO</text>
  <text x="670" y="70" text-anchor="middle" fill="#5A6275" font-size="8" font-family="Inter, sans-serif">Insights / Dashboards</text>

  <!-- Arrow 4 -->
  <line x1="740" y1="60" x2="790" y2="60" stroke="url(#flowG)" stroke-width="1.5"/>
  <polygon points="788,55 796,60 788,65" fill="#00C2FF"/>

  <!-- Stage 5: Automação -->
  <rect x="800" y="35" width="100" height="50" rx="8" fill="#1A1F2B" stroke="#00C2FF40" stroke-width="1"/>
  <text x="850" y="55" text-anchor="middle" fill="#00C2FF" font-size="10" font-weight="600" font-family="Geist, sans-serif">AÇÃO</text>
  <text x="850" y="70" text-anchor="middle" fill="#5A6275" font-size="8" font-family="Inter, sans-serif">Automação</text>

  <!-- Dots below -->
  <circle cx="70" cy="100" r="2" fill="#0A5CFF" opacity="0.5"/>
  <circle cx="270" cy="100" r="2" fill="#0A5CFF" opacity="0.3"/>
  <circle cx="470" cy="100" r="2" fill="#0A5CFF" opacity="0.5"/>
  <circle cx="670" cy="100" r="2" fill="#00C2FF" opacity="0.3"/>
  <circle cx="850" cy="100" r="2" fill="#00C2FF" opacity="0.5"/>
</svg>
