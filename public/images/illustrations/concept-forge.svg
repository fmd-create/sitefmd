<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none">
  <defs>
    <linearGradient id="metalG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A5CFF" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#1A1F2B" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00C2FF" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="forgeG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A5CFF"/>
      <stop offset="100%" stop-color="#00C2FF"/>
    </linearGradient>
  </defs>

  <!-- Background geometric structure -->
  <g opacity="0.06">
    <rect x="50" y="50" width="400" height="400" rx="20" stroke="#0A5CFF" stroke-width="1"/>
    <rect x="80" y="80" width="340" height="340" rx="15" stroke="#0A5CFF" stroke-width="0.5"/>
  </g>

  <!-- Anvil shape -->
  <path d="M160 380 L160 320 L180 300 L320 300 L340 320 L340 380 Z" fill="url(#metalG)" stroke="#0A5CFF" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Being forged - geometric form emerging -->
  <path d="M210 300 L210 240 Q250 200 290 240 L290 300" fill="none" stroke="#0A5CFF" stroke-width="2" stroke-opacity="0.6"/>
  <path d="M230 280 L230 250 Q250 230 270 250 L270 280" fill="url(#forgeG)" fill-opacity="0.15" stroke="url(#forgeG)" stroke-width="1.5"/>

  <!-- Hammer abstract -->
  <line x1="130" y1="180" x2="250" y2="260" stroke="#0A5CFF" stroke-width="2" stroke-opacity="0.3"/>
  <rect x="240" y="250" width="24" height="16" rx="3" fill="#0A5CFF" fill-opacity="0.3" transform="rotate(35 252 258)"/>

  <!-- Spark particles -->
  <g fill="#0A5CFF" opacity="0.6">
    <circle cx="270" cy="230" r="2" opacity="0.8"/>
    <circle cx="290" cy="215" r="1.5" opacity="0.5"/>
    <circle cx="250" cy="220" r="1" opacity="0.7"/>
    <circle cx="300" cy="240" r="1.5" opacity="0.4"/>
    <circle cx="230" cy="235" r="1" opacity="0.6"/>
    <circle cx="310" cy="225" r="1" opacity="0.3"/>
    <circle cx="260" cy="200" r="1.5" opacity="0.5"/>
    <circle cx="280" cy="195" r="1" opacity="0.4"/>
  </g>

  <!-- Spark lines -->
  <g stroke="#0A5CFF" stroke-width="0.5" opacity="0.3">
    <line x1="270" y1="230" x2="295" y2="205"/>
    <line x1="250" y1="220" x2="230" y2="200"/>
    <line x1="290" y1="215" x2="315" y2="195"/>
  </g>

  <!-- Heat glow -->
  <circle cx="260" cy="250" r="60" fill="#0A5CFF" opacity="0.06"/>
  <circle cx="260" cy="250" r="40" fill="#00C2FF" opacity="0.04"/>

  <!-- Label area -->
  <text x="250" y="430" text-anchor="middle" fill="#5A6275" font-size="9" font-family="Geist, sans-serif" font-weight="600" letter-spacing="3">FORGE</text>
</svg>
