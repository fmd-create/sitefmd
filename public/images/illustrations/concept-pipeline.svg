<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none">
  <defs>
    <linearGradient id="pipeG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A5CFF" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#0A5CFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00C2FF" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <g opacity="0.06">
    <rect x="50" y="50" width="400" height="400" rx="20" stroke="#0A5CFF" stroke-width="1"/>
  </g>

  <!-- Data sources left -->
  <rect x="60" y="160" width="80" height="40" rx="6" fill="#1A1F2B" stroke="#2A2F3B" stroke-width="1"/>
  <text x="100" y="185" text-anchor="middle" fill="#8B92A5" font-size="8" font-family="Geist, sans-serif" font-weight="600">DADOS</text>

  <rect x="60" y="220" width="80" height="40" rx="6" fill="#1A1F2B" stroke="#2A2F3B" stroke-width="1"/>
  <text x="100" y="245" text-anchor="middle" fill="#8B92A5" font-size="8" font-family="Geist, sans-serif" font-weight="600">APIs</text>

  <rect x="60" y="280" width="80" height="40" rx="6" fill="#1A1F2B" stroke="#2A2F3B" stroke-width="1"/>
  <text x="100" y="305" text-anchor="middle" fill="#8B92A5" font-size="8" font-family="Geist, sans-serif" font-weight="600">SISTEMAS</text>

  <!-- Data flow lines -->
  <g stroke="#0A5CFF" stroke-width="1" opacity="0.4">
    <path d="M140 180 Q 200 180 220 220"/>
    <path d="M140 240 Q 200 240 220 240"/>
    <path d="M140 300 Q 200 300 220 260"/>
  </g>

  <!-- Processing core -->
  <circle cx="300" cy="240" r="60" fill="#0A5CFF" fill-opacity="0.06" stroke="#0A5CFF" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="300" cy="240" r="40" fill="#0A5CFF" fill-opacity="0.04" stroke="#00C2FF" stroke-width="0.5" stroke-opacity="0.3"/>
  <circle cx="300" cy="240" r="20" fill="#0A5CFF" fill-opacity="0.08"/>

  <text x="300" y="244" text-anchor="middle" fill="#0A5CFF" font-size="8" font-family="Geist, sans-serif" font-weight="600">IA</text>

  <!-- Output flow right -->
  <g stroke="#00C2FF" stroke-width="1" opacity="0.4">
    <path d="M360 220 Q 400 220 420 180"/>
    <path d="M360 240 Q 400 240 420 240"/>
    <path d="M360 260 Q 400 260 420 300"/>
  </g>

  <!-- Outputs right -->
  <rect x="420" y="160" width="70" height="40" rx="6" fill="#1A1F2B" stroke="#00C2FF30" stroke-width="1"/>
  <text x="455" y="185" text-anchor="middle" fill="#8B92A5" font-size="7" font-family="Geist, sans-serif" font-weight="600">DASHBOARD</text>

  <rect x="420" y="220" width="70" height="40" rx="6" fill="#1A1F2B" stroke="#00C2FF30" stroke-width="1"/>
  <text x="455" y="245" text-anchor="middle" fill="#8B92A5" font-size="7" font-family="Geist, sans-serif" font-weight="600">AUTOMAÇÃO</text>

  <rect x="420" y="280" width="70" height="40" rx="6" fill="#1A1F2B" stroke="#00C2FF30" stroke-width="1"/>
  <text x="455" y="305" text-anchor="middle" fill="#8B92A5" font-size="7" font-family="Geist, sans-serif" font-weight="600">DECISÃO</text>

  <!-- Particle nodes along paths -->
  <g fill="#0A5CFF" opacity="0.5">
    <circle cx="180" cy="200" r="2"/>
    <circle cx="220" cy="230" r="1.5"/>
    <circle cx="250" cy="210" r="2"/>
    <circle cx="350" cy="230" r="1.5"/>
    <circle cx="380" cy="200" r="2"/>
    <circle cx="400" cy="240" r="1.5"/>
  </g>

  <text x="250" y="450" text-anchor="middle" fill="#5A6275" font-size="9" font-family="Geist, sans-serif" font-weight="600" letter-spacing="3">PIPELINE</text>
</svg>
